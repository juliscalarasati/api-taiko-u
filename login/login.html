<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - TAIKO & U</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PANGGIL CSS -->
  <link rel="stylesheet" href="../theme/global.css">
  <link rel="stylesheet" href="login.css">
</head>


<body>

  <div class="login-container">
    <div class="login-card">

      <!-- HEADER -->
      <div class="login-header">
        <h1>TAIKO & U</h1>
        <p>Teman Analisis Kesehatan Organisasi & UMKM</p>
      </div>

      <!-- TITLE -->
      <h2>Masuk ke Akun</h2>

      <!-- FORM -->
      <form onsubmit="handleLogin(event)">
        
        <div class="form-group">
          <label>Email</label>
          <input id="loginEmail" type="email" placeholder="Masukkan email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input id="loginPassword" type="password" placeholder="Masukkan password" required>
        </div>

        <button type="submit" class="btn-login">Masuk</button>

      </form>

      <!-- LINK REGISTER -->
      <p class="login-note">
        Belum punya akun? 
        <a href="../register/register.html">Daftar di sini</a>
      </p>

      <!-- BACK -->
      <a href="../landing_page/landing.html" class="back-link">
        ← Kembali ke Landing Page
      </a>

    </div>
  </div>

  <!-- SCRIPT -->
<script>
  function handleLogin(e) {
    e.preventDefault();

    const email = document.getElementById('loginEmail').value.trim().toLowerCase();
    const password = document.getElementById('loginPassword').value.trim();

    const users = JSON.parse(localStorage.getItem('users')) || [];
    const registeredUser = JSON.parse(localStorage.getItem('registeredUser'));

    let allUsers = [...users];

    if (registeredUser) {
      allUsers.push(registeredUser);
    }

    const matchedUser = allUsers.find(user =>
      user.email.trim().toLowerCase() === email &&
      user.password.trim() === password
    );

    console.log("Semua user tersimpan:", allUsers);
    console.log("Email login:", email);
    console.log("Password login:", password);

    if (allUsers.length === 0) {
      alert('Belum ada akun yang terdaftar. Silakan register terlebih dahulu.');
      window.location.href = '../register/register.html';
      return;
    }

    if (!matchedUser) {
      alert('Email atau password salah.');
      return;
    }

    localStorage.setItem('isLoggedIn', 'true');
    localStorage.setItem('activeUser', JSON.stringify(matchedUser));

    alert('Login berhasil!');
    window.location.href = '/taiko-u/beranda/index.html';
  }
</script>
</body>
</html>
