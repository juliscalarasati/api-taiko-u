<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - TAIKO & U</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/theme/global.css">
  <link rel="stylesheet" href="register.css">
</head>


<body>
  <div class="register-container">
    <div class="register-card">

      <div class="register-header">
        <h1>TAIKO & U</h1>
        <p>Daftarkan akun dan data UMKM Anda untuk memulai analisis organisasi.</p>
      </div>

      <h2>Buat Akun</h2>

      <form onsubmit="handleRegister(event)">

        <div class="form-group">
          <label>Nama Pengguna</label>
          <input id="registerName" type="text" placeholder="Masukkan nama Anda" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input id="registerEmail" type="email" placeholder="Masukkan email" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input id="registerPassword" type="password" placeholder="Buat password" required>
        </div>

        <div class="form-group">
          <label>Nama UMKM</label>
          <input id="umkmName" type="text" placeholder="Contoh: Kopi Nusantara" required>
        </div>

        <div class="form-group">
          <label>Sektor UMKM</label>
          <input id="umkmSector" type="text" placeholder="Contoh: Kuliner, Fashion, Jasa" required>
        </div>

        <div class="form-group">
          <label>Role Pengguna</label>
          <select id="userRole" required>
            <option value="">Pilih role</option>
            <option value="owner">Owner / Pemilik UMKM</option>
            <option value="employee">Karyawan / Tim UMKM</option>
          </select>
        </div>

        <small class="form-help">
          Jika Anda karyawan, pastikan nama UMKM diisi sama seperti yang didaftarkan owner.
        </small>

        <button type="submit" class="btn-register">Daftar</button>
      </form>

      <p class="register-note">
        Sudah punya akun?
        <a href="../login/login.html">Masuk di sini</a>
      </p>

      <a href="../landing_page/landing.html" class="back-link">
        ← Kembali ke Landing Page
      </a>

    </div>
  </div>

  <script>
async function handleRegister(e) {
  e.preventDefault();

  const data = {
    name: document.getElementById('registerName').value,
    email: document.getElementById('registerEmail').value,
    password: document.getElementById('registerPassword').value,
    umkmName: document.getElementById('umkmName').value,
    umkmSector: document.getElementById('umkmSector').value,
    role: document.getElementById('userRole').value
  };

  try {
    const response = await fetch('/taiko-u/backend/api/register.php', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if (result.success) {
      alert('Registrasi berhasil!');
      window.location.href = '../login/login.html';
    } else {
      alert(result.message);
    }

  } catch (error) {
    console.error(error);
    alert('Terjadi error saat register');
  }
}
</script>
</body>
</html>
